version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: complyos-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - complyos-network

  redis:
    image: redis:7-alpine
    container_name: complyos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - complyos-network

  backend:
    build: .
    container_name: complyos-backend
    environment:
      - MONGODB_URL=mongodb://admin:admin123@mongodb:27017
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    networks:
      - complyos-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
  redis_data:

networks:
  complyos-network:
    driver: bridge
